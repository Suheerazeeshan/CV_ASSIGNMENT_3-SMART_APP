<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Full mouth anatomy color reference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="480" fill="url(#bg)"/>
  <text x="320" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Full mouth  upper &amp; lower (color reference)</text>

  <!-- Upper arch bone (translucent) -->
  <path d="M120 168 Q320 118 520 168 Q500 210 320 228 Q140 210 120 168Z" fill="#fff6ee" fill-opacity="0.35" stroke="#f8fafc" stroke-width="1.2"/>
  <!-- Upper gum -->
  <path d="M140 182 Q320 152 500 182 Q480 198 320 208 Q160 198 140 182Z" fill="#e06b6b"/>
  <!-- Upper teeth -->
  <g fill="#fffaf5" stroke="#e2e8f0" stroke-width="0.6">
    <rect x="175" y="168" width="14" height="22" rx="4"/><rect x="205" y="162" width="14" height="24" rx="4"/>
    <rect x="235" y="158" width="14" height="26" rx="4"/><rect x="265" y="156" width="14" height="28" rx="4"/>
    <rect x="295" y="154" width="16" height="30" rx="4"/><rect x="325" y="156" width="14" height="28" rx="4"/>
    <rect x="355" y="158" width="14" height="26" rx="4"/><rect x="385" y="162" width="14" height="24" rx="4"/>
    <rect x="415" y="168" width="14" height="22" rx="4"/>
  </g>
  <!-- Upper nerves / vessels -->
  <path d="M150 200 Q320 188 490 200" stroke="#ffe033" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M160 208 Q320 196 480 208" stroke="#e82222" stroke-width="2.5" fill="none"/>
  <path d="M170 214 Q320 202 470 214" stroke="#2a4fd4" stroke-width="2.5" fill="none"/>

  <!-- Lower arch bone -->
  <path d="M110 312 Q320 362 530 312 Q510 268 320 250 Q130 268 110 312Z" fill="#fff6ee" fill-opacity="0.35" stroke="#f8fafc" stroke-width="1.2"/>
  <!-- Lower gum -->
  <path d="M130 298 Q320 328 510 298 Q490 282 320 272 Q150 282 130 298Z" fill="#e06b6b"/>
  <!-- Lower teeth -->
  <g fill="#fffaf5" stroke="#e2e8f0" stroke-width="0.6">
    <rect x="170" y="288" width="14" height="24" rx="4"/><rect x="200" y="282" width="14" height="26" rx="4"/>
    <rect x="230" y="278" width="14" height="28" rx="4"/><rect x="260" y="276" width="14" height="30" rx="4"/>
    <rect x="290" y="274" width="16" height="32" rx="4"/><rect x="320" y="276" width="14" height="30" rx="4"/>
    <rect x="350" y="278" width="14" height="28" rx="4"/><rect x="380" y="282" width="14" height="26" rx="4"/>
    <rect x="410" y="288" width="14" height="24" rx="4"/>
  </g>
  <!-- Lower nerves / vessels -->
  <path d="M145 268 Q320 280 495 268" stroke="#ffe033" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M155 260 Q320 272 485 260" stroke="#e82222" stroke-width="2.5" fill="none"/>
  <path d="M165 254 Q320 266 475 254" stroke="#2a4fd4" stroke-width="2.5" fill="none"/>

  <!-- Legend -->
  <g font-family="system-ui,sans-serif" font-size="12" fill="#cbd5e1">
    <rect x="48" y="400" width="12" height="12" fill="#fffaf5" rx="2"/><text x="68" y="410">Teeth</text>
    <rect x="128" y="400" width="12" height="12" fill="#e06b6b" rx="2"/><text x="148" y="410">Gums</text>
    <rect x="208" y="400" width="12" height="12" fill="#ffe033" rx="2"/><text x="228" y="410">Nerves</text>
    <rect x="288" y="400" width="12" height="12" fill="#e82222" rx="2"/><text x="308" y="410">Arteries</text>
    <rect x="378" y="400" width="12" height="12" fill="#2a4fd4" rx="2"/><text x="398" y="410">Veins</text>
    <rect x="458" y="400" width="12" height="12" fill="#fff6ee" fill-opacity="0.5" stroke="#94a3b8" rx="2"/><text x="478" y="410">Bone</text>
  </g>
</svg>
