<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Occlusal full mouth color reference">
  <rect width="640" height="480" fill="#0f172a"/>
  <text x="320" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Occlusal view  full mouth</text>
  <!-- Upper arch (outer ring) -->
  <ellipse cx="320" cy="240" rx="220" ry="150" fill="#fff6ee" fill-opacity="0.25" stroke="#e2e8f0" stroke-width="1"/>
  <ellipse cx="320" cy="240" rx="195" ry="128" fill="none" stroke="#e06b6b" stroke-width="14"/>
  <ellipse cx="320" cy="240" rx="155" ry="98" fill="none" stroke="#fffaf5" stroke-width="18" stroke-dasharray="8 6"/>
  <!-- Lower arch (inner) -->
  <ellipse cx="320" cy="240" rx="120" ry="72" fill="#fff6ee" fill-opacity="0.3"/>
  <ellipse cx="320" cy="240" rx="105" ry="62" fill="none" stroke="#e06b6b" stroke-width="10"/>
  <ellipse cx="320" cy="240" rx="78" ry="44" fill="none" stroke="#fffaf5" stroke-width="12"/>
  <!-- Nerves ring -->
  <ellipse cx="320" cy="240" rx="175" ry="112" fill="none" stroke="#ffe033" stroke-width="3"/>
  <ellipse cx="320" cy="240" rx="88" ry="52" fill="none" stroke="#ffe033" stroke-width="2"/>
  <text x="320" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Upper &amp; lower arches  teaching occlusal diagram</text>
</svg>
